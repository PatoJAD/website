<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión - PatoJAD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Open Sans', system-ui, -apple-system, sans-serif;
      background-color: #18181b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #a21caf;
    }
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #a1a1aa;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #a21caf;
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .retry-btn:hover {
      background-color: #86198f;
    }
    .hint {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #71717a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin conexión a Internet</h1>
    <p>
      Parece que no tenés conexión en este momento.
      Las páginas que visitaste antes pueden estar disponibles en caché.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">Reintentar</button>
    <p class="hint">
      Cuando recuperes la conexión, podrás seguir navegando normalmente.
    </p>
  </div>
</body>
</html>
